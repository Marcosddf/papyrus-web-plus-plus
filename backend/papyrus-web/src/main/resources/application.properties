server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5439/papyrus-web-db
spring.datasource.username=dbuser
spring.datasource.password=dbpwd

spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.change-log=classpath:db/changelog/papyrus-web.db.changelog.xml

sirius.web.enabled=*
sirius.web.disabled=studio
sirius.components.cors.allowedOriginPatterns=*
sirius.components.cors.allowedCredentials=true

papyrusweb.integration.tests.datasource.url=jdbc:postgresql://localhost:5439/papyrus-web-db
papyrusweb.integration.tests.datasource.username=dbuser
papyrusweb.integration.tests.datasource.password=dbpwd

liquibase.analytics.enabled: false
